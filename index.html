<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="VenueFlow — Smart Venue Experience Platform for real-time crowd intelligence, wait time optimization, and seamless event coordination at large-scale sporting venues.">
  <title>VenueFlow — Smart Venue Experience Platform</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/attendee.css">
  <link rel="stylesheet" href="css/dashboard.css">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>

  <!-- ===== Top Bar ===== -->
  <header id="app-header" style="
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(10, 14, 26, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--color-border);
    padding: var(--space-sm) var(--space-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-lg);
  ">
    <!-- Logo -->
    <div style="
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      position: absolute;
      left: var(--space-lg);
    ">
      <span style="font-size: 24px;">⚡</span>
      <span style="
        font-family: var(--font-heading);
        font-weight: 800;
        font-size: var(--text-lg);
        background: var(--gradient-blue);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.02em;
      ">VenueFlow</span>
    </div>

    <!-- View Switcher -->
    <div class="view-switcher" id="view-switcher">
      <button class="view-switcher__btn view-switcher__btn--active" data-view="attendee">
        📱 Attendee App
      </button>
      <button class="view-switcher__btn" data-view="dashboard">
        📊 Operations Dashboard
      </button>
    </div>

    <!-- Right side: API status + Settings -->
    <div style="
      position: absolute;
      right: var(--space-lg);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    ">
      <span id="api-status-indicator">
        <span class="badge badge--yellow">🔄 Simulated</span>
      </span>
      <button class="btn btn-ghost btn-sm" id="settings-btn" title="API Settings" style="font-size:16px;padding:4px 8px">
        ⚙️
      </button>
    </div>
  </header>

  <!-- ===== Settings Modal ===== -->
  <div class="settings-modal-overlay" id="settings-modal-overlay">
    <div class="settings-modal" id="settings-modal-content">
      <!-- Content injected by app.js -->
    </div>
  </div>

  <!-- ===== Main Content ===== -->
  <main>
    <!-- Attendee View -->
    <div id="attendee-container" style="display: block;"></div>

    <!-- Dashboard View -->
    <div id="dashboard-container" style="display: none;"></div>
  </main>

  <!-- ===== Scripts ===== -->
  <script src="js/data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/heatmap.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/attendee.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
