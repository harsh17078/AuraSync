<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Insight-X — Smart Venue Experience Platform for real-time crowd intelligence, wait time optimization, and seamless event coordination at large-scale sporting venues.">
  <title>Insight-X — Smart Venue Experience Platform</title>
  <!-- Stylesheets -->
  <style>
/* css/global.css */
/* ============================================================
   Insight-X — Design System
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap');
/* --- Design Tokens --- */
:root {
  /* Primary palette */
  --color-bg-primary: #0a0e1a;
  --color-bg-secondary: #111827;
  --color-bg-card: rgba(17, 24, 39, 0.7);
  --color-bg-card-hover: rgba(24, 34, 56, 0.85);
  --color-bg-elevated: rgba(30, 41, 66, 0.6);
  /* Accent colors */
  --color-accent-blue: #00D4FF;
  --color-accent-blue-dim: rgba(0, 212, 255, 0.15);
  --color-accent-blue-glow: rgba(0, 212, 255, 0.3);
  --color-accent-amber: #FFB800;
  --color-accent-amber-dim: rgba(255, 184, 0, 0.15);
  --color-accent-purple: #A855F7;
  --color-accent-purple-dim: rgba(168, 85, 247, 0.15);
  /* Status colors */
  --color-green: #22C55E;
  --color-green-dim: rgba(34, 197, 94, 0.15);
  --color-yellow: #EAB308;
  --color-yellow-dim: rgba(234, 179, 8, 0.15);
  --color-orange: #F97316;
  --color-orange-dim: rgba(249, 115, 22, 0.15);
  --color-red: #EF4444;
  --color-red-dim: rgba(239, 68, 68, 0.15);
  /* Text */
  --color-text-primary: #F1F5F9;
  --color-text-secondary: #94A3B8;
  --color-text-muted: #64748B;
  --color-text-inverse: #0a0e1a;
  /* Borders */
  --color-border: rgba(148, 163, 184, 0.1);
  --color-border-hover: rgba(148, 163, 184, 0.25);
  --color-border-accent: rgba(0, 212, 255, 0.3);
  /* Gradients */
  --gradient-blue: linear-gradient(135deg, #00D4FF, #0066FF);
  --gradient-amber: linear-gradient(135deg, #FFB800, #FF6B00);
  --gradient-purple: linear-gradient(135deg, #A855F7, #6366F1);
  --gradient-green: linear-gradient(135deg, #22C55E, #16A34A);
  --gradient-red: linear-gradient(135deg, #EF4444, #DC2626);
  --gradient-card: linear-gradient(135deg, rgba(17, 24, 39, 0.8), rgba(30, 41, 66, 0.4));
  --gradient-hero: linear-gradient(180deg, rgba(0, 212, 255, 0.08) 0%, transparent 60%);
  /* Shadows */
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
  --shadow-glow-blue: 0 0 20px rgba(0, 212, 255, 0.2);
  --shadow-glow-amber: 0 0 20px rgba(255, 184, 0, 0.2);
  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --space-2xl: 48px;
  --space-3xl: 64px;
  /* Radius */
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-full: 9999px;
  /* Typography */
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-heading: 'Outfit', 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  /* Font sizes */
  --text-xs: 0.7rem;
  --text-sm: 0.8rem;
  --text-base: 0.95rem;
  --text-lg: 1.1rem;
  --text-xl: 1.25rem;
  --text-2xl: 1.5rem;
  --text-3xl: 2rem;
  --text-4xl: 2.5rem;
  /* Transitions */
  --transition-fast: 150ms ease;
  --transition-base: 250ms ease;
  --transition-slow: 400ms ease;
  --transition-spring: 500ms cubic-bezier(0.34, 1.56, 0.64, 1);
}
/* --- Reset & Base --- */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
html {
  font-size: 16px;
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body {
  font-family: var(--font-body);
  background: var(--color-bg-primary);
  color: var(--color-text-primary);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}
/* Background ambient effect */
body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 30% 20%, rgba(0, 212, 255, 0.04) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, rgba(168, 85, 247, 0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
  animation: ambientShift 20s ease-in-out infinite alternate;
}
@keyframes ambientShift {
  0% { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(-3%, 3%) rotate(2deg); }
}
/* --- Typography --- */
h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-heading);
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.02em;
}
h1 { font-size: var(--text-4xl); }
h2 { font-size: var(--text-3xl); }
h3 { font-size: var(--text-2xl); }
h4 { font-size: var(--text-xl); }
h5 { font-size: var(--text-lg); }
/* --- Glass Card --- */
.glass-card {
  background: var(--gradient-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  transition: border-color var(--transition-base), box-shadow var(--transition-base), transform var(--transition-base);
}
.glass-card:hover {
  border-color: var(--color-border-hover);
  box-shadow: var(--shadow-md);
}
.glass-card--interactive:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}
.glass-card--glow {
  box-shadow: var(--shadow-glow-blue);
  border-color: var(--color-border-accent);
}
/* --- Buttons --- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-sm);
  padding: var(--space-sm) var(--space-md);
  border: 1px solid transparent;
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: var(--text-sm);
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition-base);
  position: relative;
  overflow: hidden;
  text-decoration: none;
  white-space: nowrap;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255, 255, 255, 0);
  transition: background var(--transition-fast);
}
.btn:hover::after {
  background: rgba(255, 255, 255, 0.05);
}
.btn:active {
  transform: scale(0.97);
}
.btn-primary {
  background: var(--gradient-blue);
  color: white;
  box-shadow: var(--shadow-glow-blue);
}
.btn-primary:hover {
  box-shadow: 0 0 30px rgba(0, 212, 255, 0.35);
}
.btn-secondary {
  background: var(--color-bg-elevated);
  color: var(--color-text-primary);
  border-color: var(--color-border);
}
.btn-secondary:hover {
  border-color: var(--color-border-hover);
  background: var(--color-bg-card-hover);
}
.btn-ghost {
  background: transparent;
  color: var(--color-text-secondary);
}
.btn-ghost:hover {
  color: var(--color-text-primary);
  background: var(--color-bg-elevated);
}
.btn-danger {
  background: var(--gradient-red);
  color: white;
}
.btn-sm {
  padding: var(--space-xs) var(--space-sm);
  font-size: var(--text-xs);
  border-radius: var(--radius-sm);
}
.btn-lg {
  padding: var(--space-md) var(--space-xl);
  font-size: var(--text-base);
  border-radius: var(--radius-lg);
}
/* --- Badges --- */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 10px;
  border-radius: var(--radius-full);
  font-size: var(--text-xs);
  font-weight: 600;
  letter-spacing: 0.03em;
}
.badge--green { background: var(--color-green-dim); color: var(--color-green); }
.badge--yellow { background: var(--color-yellow-dim); color: var(--color-yellow); }
.badge--orange { background: var(--color-orange-dim); color: var(--color-orange); }
.badge--red { background: var(--color-red-dim); color: var(--color-red); }
.badge--blue { background: var(--color-accent-blue-dim); color: var(--color-accent-blue); }
.badge--purple { background: var(--color-accent-purple-dim); color: var(--color-accent-purple); }
.badge--amber { background: var(--color-accent-amber-dim); color: var(--color-accent-amber); }
/* --- Live indicator --- */
.live-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--color-red);
  display: inline-block;
  position: relative;
  animation: livePulse 2s ease-in-out infinite;
}
.live-dot::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2px solid var(--color-red);
  animation: liveRing 2s ease-out infinite;
}
@keyframes livePulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(0.85); }
}
@keyframes liveRing {
  0% { transform: scale(0.8); opacity: 0.8; }
  100% { transform: scale(2); opacity: 0; }
}
/* --- Progress Bar --- */
.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--color-bg-elevated);
  border-radius: var(--radius-full);
  overflow: hidden;
  position: relative;
}
.progress-bar__fill {
  height: 100%;
  border-radius: var(--radius-full);
  transition: width var(--transition-slow);
  position: relative;
}
.progress-bar__fill::after {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 30px;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
  animation: progressShine 2s ease-in-out infinite;
}
@keyframes progressShine {
  0% { opacity: 0; }
  50% { opacity: 1; }
  100% { opacity: 0; }
}
/* --- Stat Card --- */
.stat-value {
  font-family: var(--font-heading);
  font-weight: 800;
  font-size: var(--text-3xl);
  line-height: 1;
  background: var(--gradient-blue);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.stat-value--amber {
  background: var(--gradient-amber);
  -webkit-background-clip: text;
  background-clip: text;
}
.stat-value--green {
  background: var(--gradient-green);
  -webkit-background-clip: text;
  background-clip: text;
}
.stat-value--purple {
  background: var(--gradient-purple);
  -webkit-background-clip: text;
  background-clip: text;
}
.stat-value--red {
  background: var(--gradient-red);
  -webkit-background-clip: text;
  background-clip: text;
}
.stat-label {
  font-size: var(--text-sm);
  color: var(--color-text-secondary);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
/* --- Scrollbar --- */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: var(--color-border-hover);
  border-radius: var(--radius-full);
}
::-webkit-scrollbar-thumb:hover {
  background: var(--color-text-muted);
}
/* --- Utility --- */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  border: 0;
}
.text-gradient-blue {
  background: var(--gradient-blue);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.text-gradient-amber {
  background: var(--gradient-amber);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
/* Count up animation helper */
.count-up {
  display: inline-block;
  transition: transform var(--transition-fast);
}
/* Fade/slide in */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-30px); }
  to { opacity: 1; transform: translateX(0); }
}
.animate-fade-in { animation: fadeIn var(--transition-slow) ease both; }
.animate-fade-in-up { animation: fadeInUp var(--transition-slow) ease both; }
.animate-slide-right { animation: slideInRight var(--transition-slow) ease both; }
.animate-slide-left { animation: slideInLeft var(--transition-slow) ease both; }
/* Stagger children */
.stagger > *:nth-child(1) { animation-delay: 0ms; }
.stagger > *:nth-child(2) { animation-delay: 60ms; }
.stagger > *:nth-child(3) { animation-delay: 120ms; }
.stagger > *:nth-child(4) { animation-delay: 180ms; }
.stagger > *:nth-child(5) { animation-delay: 240ms; }
.stagger > *:nth-child(6) { animation-delay: 300ms; }
.stagger > *:nth-child(7) { animation-delay: 360ms; }
.stagger > *:nth-child(8) { animation-delay: 420ms; }
/* --- App Header --- */
.app-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(10, 14, 26, 0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--color-border);
  padding: var(--space-sm) var(--space-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-lg);
}
.app-header__logo {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  position: absolute;
  left: var(--space-lg);
}
.app-header__brand {
  font-family: var(--font-heading);
  font-weight: 800;
  font-size: var(--text-lg);
  background: var(--gradient-blue);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.02em;
}
.app-header__sync {
  font-size: 8px;
  font-weight: 700;
  color: var(--color-green);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  opacity: 0.8;
}
.app-header__right {
  position: absolute;
  right: var(--space-lg);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}
@media (max-width: 768px) {
  .app-header__sync { display: none; }
  .app-header__logo span:first-child { font-size: 18px !important; }
  .app-header { padding: 6px var(--space-sm); gap: var(--space-sm); }
}
/* --- View Switch Tabs --- */
.view-switcher {
  display: flex;
  gap: var(--space-xs);
  background: var(--color-bg-secondary);
  padding: 4px;
  border-radius: var(--radius-full);
  border: 1px solid var(--color-border);
  width: fit-content;
}
.view-switcher__btn {
  padding: var(--space-sm) var(--space-lg);
  border: none;
  border-radius: var(--radius-full);
  font-family: var(--font-body);
  font-size: var(--text-sm);
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition-base);
  background: transparent;
  color: var(--color-text-muted);
}
.view-switcher__btn:hover {
  color: var(--color-text-secondary);
}
.view-switcher__btn--active {
  background: var(--gradient-blue);
  color: white;
  box-shadow: var(--shadow-glow-blue);
}
/* --- Tooltip --- */
.tooltip {
  position: relative;
}
.tooltip::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: 120%;
  left: 50%;
  transform: translateX(-50%) translateY(4px);
  background: var(--color-bg-card);
  color: var(--color-text-primary);
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  font-size: var(--text-xs);
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: all var(--transition-fast);
  border: 1px solid var(--color-border);
}
.tooltip:hover::after {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
/* --- Container --- */
.container {
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 var(--space-lg);
}
/* --- Grid --- */
.grid {
  display: grid;
  gap: var(--space-md);
}
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-5 { grid-template-columns: repeat(5, 1fr); }
@media (max-width: 1024px) {
  .grid-4, .grid-5 { grid-template-columns: repeat(2, 1fr); }
  .grid-3 { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 640px) {
  .grid-2, .grid-3, .grid-4, .grid-5 { grid-template-columns: 1fr; }
}
/* --- Loading shimmer --- */
.shimmer {
  background: linear-gradient(90deg, var(--color-bg-secondary) 25%, var(--color-bg-elevated) 50%, var(--color-bg-secondary) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
/* --- Notification toast --- */
.toast {
  position: fixed;
  bottom: var(--space-lg);
  right: var(--space-lg);
  background: var(--color-bg-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-md) var(--space-lg);
  backdrop-filter: blur(20px);
  box-shadow: var(--shadow-lg);
  z-index: 1000;
  animation: slideInRight var(--transition-slow) ease both;
  max-width: 380px;
}
.toast--success { border-color: rgba(34, 197, 94, 0.4); }
.toast--warning { border-color: rgba(234, 179, 8, 0.4); }
.toast--error { border-color: rgba(239, 68, 68, 0.4); }
/* Number animation */
@keyframes countPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}
/* ============================================================
   Settings Modal
   ============================================================ */
.settings-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition-base);
}
.settings-modal--open {
  opacity: 1;
  pointer-events: all;
}
.settings-modal--open .settings-modal {
  transform: translateY(0) scale(1);
  opacity: 1;
}
.settings-modal {
  background: var(--color-bg-secondary);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-xl);
  width: 90%;
  max-width: 580px;
  max-height: 85vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
  transform: translateY(20px) scale(0.97);
  opacity: 0;
  transition: transform var(--transition-slow), opacity var(--transition-slow);
}
.settings-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-lg);
  border-bottom: 1px solid var(--color-border);
  flex-shrink: 0;
}
.settings-body {
  padding: var(--space-lg);
  overflow-y: auto;
  flex: 1;
}
.settings-footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: var(--space-sm);
  padding: var(--space-md) var(--space-lg);
  border-top: 1px solid var(--color-border);
  flex-shrink: 0;
}
.settings-section {
  margin-bottom: var(--space-lg);
  padding-bottom: var(--space-lg);
  border-bottom: 1px solid var(--color-border);
}
.settings-section:last-child {
  border-bottom: none;
  margin-bottom: 0;
  padding-bottom: 0;
}
.settings-section__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-sm);
}
.settings-section__title {
  font-family: var(--font-heading);
  font-size: var(--text-base);
  font-weight: 700;
  color: var(--color-text-primary);
}
.settings-section__desc {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  margin-bottom: var(--space-md);
  line-height: 1.5;
}
.settings-field {
  margin-bottom: var(--space-md);
}
.settings-label {
  display: block;
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--color-text-secondary);
  margin-bottom: var(--space-xs);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.settings-input {
  width: 100%;
  padding: var(--space-sm) var(--space-md);
  background: var(--color-bg-primary);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  color: var(--color-text-primary);
  font-family: var(--font-body);
  font-size: var(--text-sm);
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
  outline: none;
}
.settings-input:focus {
  border-color: var(--color-accent-blue);
  box-shadow: 0 0 0 3px var(--color-accent-blue-dim);
}
.settings-input::placeholder {
  color: var(--color-text-muted);
}
.settings-input-group {
  display: flex;
  gap: var(--space-sm);
}
.settings-input-group .settings-input {
  flex: 1;
}
.settings-row {
  display: flex;
  gap: var(--space-md);
}
.settings-error {
  font-size: var(--text-xs);
  color: var(--color-red);
  margin-top: var(--space-xs);
  padding: var(--space-xs) var(--space-sm);
  background: var(--color-red-dim);
  border-radius: var(--radius-sm);
}
.settings-success {
  font-size: var(--text-xs);
  color: var(--color-green);
  margin-top: var(--space-xs);
  padding: var(--space-xs) var(--space-sm);
  background: var(--color-green-dim);
  border-radius: var(--radius-sm);
}
/* css/attendee.css */
/* ============================================================
   Insight-X Attendee — Desktop + Mobile Layout
   Reference: YelloveOS-style full-width dashboard
   ============================================================ */
/* ---- Layout Foundation ---- */
.vf { width: 100%; min-height: calc(100vh - 52px); }
.vf-layout {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: var(--space-md);
  padding: var(--space-md) var(--space-lg);
  max-width: 1600px;
  margin: 0 auto;
}
.vf-left { display: flex; flex-direction: column; gap: var(--space-md); min-width: 0; }
.vf-right { display: flex; flex-direction: column; gap: var(--space-md); min-width: 0; }
/* ---- Broadcast Banner ---- */
.vf-broadcast {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: 10px var(--space-lg);
  background: linear-gradient(90deg, rgba(234, 179, 8, 0.12), rgba(234, 179, 8, 0.03));
  border-bottom: 1px solid rgba(234, 179, 8, 0.2);
  overflow: hidden;
}
.vf-broadcast__tag {
  background: var(--color-accent-amber);
  color: #000;
  font-family: var(--font-heading);
  font-weight: 800;
  font-size: 10px;
  padding: 3px 10px;
  border-radius: var(--radius-full);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  flex-shrink: 0;
}
.vf-broadcast__text {
  font-size: var(--text-sm);
  color: var(--color-text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  animation: marquee 25s linear infinite;
}
@keyframes marquee {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
/* ---- Panels ---- */
.vf-panel {
  background: var(--gradient-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-md);
  overflow: hidden;
}
.vf-panel__header {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  margin-bottom: var(--space-md);
}
.vf-panel__icon { font-size: 16px; }
.vf-panel__title {
  font-family: var(--font-heading);
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--color-text-primary);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.vf-panel__badge {
  margin-left: auto;
  font-size: var(--text-xs);
  color: var(--color-text-muted);
}
/* ---- Smart Decision Engine ---- */
.sde-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: var(--space-sm);
}
.sde-card {
  background: var(--color-bg-elevated);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-md);
  cursor: pointer;
  transition: all var(--transition-base);
  position: relative;
  overflow: hidden;
}
.sde-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}
.sde-card--green::before { background: var(--color-green); }
.sde-card--blue::before { background: var(--color-accent-blue); }
.sde-card--amber::before { background: var(--color-accent-amber); }
.sde-card--purple::before { background: var(--color-accent-purple); }
.sde-card--cyan::before { background: var(--color-accent-blue); }
.sde-card:hover { border-color: var(--color-border-hover); transform: translateY(-2px); }
.sde-card__label {
  font-size: 9px;
  font-weight: 700;
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: var(--space-xs);
}
.sde-card__dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  display: inline-block;
}
.sde-card__dot--green { background: var(--color-green); }
.sde-card__dot--blue { background: var(--color-accent-blue); }
.sde-card__dot--amber { background: var(--color-accent-amber); }
.sde-card__dot--purple { background: var(--color-accent-purple); }
.sde-card__dot--cyan { background: var(--color-accent-blue); }
.sde-card__name {
  font-family: var(--font-heading);
  font-size: var(--text-base);
  font-weight: 800;
  color: var(--color-text-primary);
  margin-bottom: 4px;
  line-height: 1.2;
}
.sde-card__detail {
  font-size: 10px;
  color: var(--color-text-muted);
  line-height: 1.4;
}
/* ---- Panel Tabs ---- */
.vf-tabs {
  display: flex;
  gap: 2px;
  background: var(--color-bg-elevated);
  border-radius: var(--radius-md);
  padding: 3px;
  border: 1px solid var(--color-border);
}
.vf-tab {
  flex: 1;
  padding: 8px 12px;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--font-body);
  color: var(--color-text-muted);
  background: none;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition-fast);
  text-align: center;
}
.vf-tab:hover { color: var(--color-text-secondary); background: rgba(255,255,255,0.03); }
.vf-tab--active {
  background: rgba(0, 212, 255, 0.1);
  color: var(--color-accent-blue);
  box-shadow: 0 0 8px rgba(0, 212, 255, 0.1);
}
/* ---- Sections ---- */
.vf-section { display: none; }
.vf-section--active { display: block; }
/* ---- Navigation Split ---- */
.vf-nav-split {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: var(--space-md);
}
.vf-nav-map {
  position: relative;
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--color-border);
}
.vf-map-canvas {
  width: 100%;
  height: 400px;
  display: block;
}
.vf-map-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  padding: 8px 12px;
  background: rgba(0, 0, 0, 0.7);
  font-size: var(--text-xs);
}
.vf-map-overlay__seat { color: var(--color-accent-blue); font-weight: 700; }
.vf-map-overlay__cap { color: var(--color-text-muted); }
.vf-active-route-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: linear-gradient(90deg, rgba(34, 197, 94, 0.15), rgba(34, 197, 94, 0.05));
  border-bottom: 1px solid rgba(34, 197, 94, 0.3);
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--color-green);
}
.vf-active-route-bar__sub {
  font-weight: 500;
  color: var(--color-text-muted);
  font-style: italic;
  margin-left: 4px;
}
.vf-nav-dests {
  max-height: 440px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
  padding-right: 4px;
}
.vf-nav-dests::-webkit-scrollbar { width: 4px; }
.vf-nav-dests::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }
.vf-dest-group__title {
  font-size: 10px;
  font-weight: 700;
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
  padding-top: 4px;
}
.vf-dest-item {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: 8px 10px;
  background: var(--color-bg-elevated);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--transition-fast);
}
.vf-dest-item:hover { border-color: var(--color-border-hover); }
.vf-dest-item--selected {
  border-color: var(--color-accent-blue) !important;
  box-shadow: var(--shadow-glow-blue);
  background: rgba(0, 212, 255, 0.05);
}
.vf-dest-item__icon { font-size: 18px; flex-shrink: 0; }
.vf-dest-item__info { flex: 1; min-width: 0; }
.vf-dest-item__name { font-size: var(--text-xs); font-weight: 700; color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.vf-dest-item__crowd { display: flex; gap: 2px; margin-top: 2px; }
.vf-dest-item__time { font-family: var(--font-heading); font-size: var(--text-sm); font-weight: 800; color: var(--color-green); flex-shrink: 0; }
.vf-dest-item__time--warn { color: var(--color-red); }
/* ---- Route Detail ---- */
.vf-route-detail {
  margin-top: var(--space-md);
  background: linear-gradient(135deg, rgba(0, 212, 255, 0.06), rgba(0, 102, 255, 0.03));
  border: 1px solid rgba(0, 212, 255, 0.2);
  border-radius: var(--radius-lg);
  padding: var(--space-md);
}
.vf-route-detail__header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--space-sm);
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--color-text-primary);
}
.vf-route-detail__time {
  font-family: var(--font-heading);
  font-size: var(--text-2xl);
  font-weight: 800;
  color: var(--color-accent-blue);
}
.vf-route-detail__segs {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
/* ---- Queue Telemetry ---- */
.vf-ql-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-md);
}
.vf-queue-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.vf-queue-row {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  transition: background var(--transition-fast);
}
.vf-queue-row:hover { background: rgba(255,255,255,0.02); }
.vf-queue-row__icon { font-size: 18px; flex-shrink: 0; }
.vf-queue-row__info { flex: 1; min-width: 0; }
.vf-queue-row__name { font-size: var(--text-sm); font-weight: 700; color: var(--color-text-primary); }
.vf-queue-row__zone { font-size: 10px; color: var(--color-text-muted); }
.vf-queue-row__time {
  font-family: var(--font-heading);
  font-size: var(--text-sm);
  font-weight: 800;
  padding: 2px 8px;
  border-radius: var(--radius-full);
  flex-shrink: 0;
}
.vf-queue-row__time--green { color: var(--color-green); background: var(--color-green-dim); }
.vf-queue-row__time--amber { color: var(--color-accent-amber); background: var(--color-accent-amber-dim); }
.vf-queue-row__time--red { color: var(--color-red); background: var(--color-red-dim); }
.vf-queue-row__join {
  font-size: 9px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: var(--radius-full);
  border: 1px solid var(--color-accent-blue);
  background: rgba(0, 212, 255, 0.1);
  color: var(--color-accent-blue);
  cursor: pointer;
  transition: all var(--transition-fast);
  flex-shrink: 0;
}
.vf-queue-row__join:hover { background: rgba(0, 212, 255, 0.2); }
/* ---- AR Layout ---- */
.vf-ar-layout {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: var(--space-md);
}
.vf-ar-sidebar {
  display: flex;
  flex-direction: column;
  gap: var(--space-xs);
  max-height: 420px;
  overflow-y: auto;
}
/* ---- Ticket Layout ---- */
.vf-ticket-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-md);
}
.vf-ticket-layout > .digital-ticket {
  grid-column: 1 / -1;
}
/* ---- Match Card ---- */
.vf-match-card {
  background: var(--gradient-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-md);
}
.vf-match-inner { text-align: center; }
.vf-match-teams {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-md);
  margin-bottom: var(--space-sm);
}
.vf-match-team {
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--color-text-primary);
}
.vf-match-score {
  font-family: var(--font-heading);
  font-size: var(--text-3xl);
  font-weight: 800;
  color: var(--color-text-primary);
}
.vf-match-meta {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: var(--space-sm);
  font-size: var(--text-xs);
  color: var(--color-text-muted);
}
.vf-match-minute {
  color: var(--color-accent-blue);
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 4px;
}
/* ---- Squad Radar ---- */
.squad-item {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.squad-item:last-child { border-bottom: none; }
.squad-item__avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--color-bg-elevated);
  border: 1px solid var(--color-border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-heading);
  font-weight: 800;
  font-size: var(--text-sm);
  color: var(--color-accent-blue);
  flex-shrink: 0;
}
.squad-item__info { flex: 1; min-width: 0; }
.squad-item__name { font-size: var(--text-sm); font-weight: 700; color: var(--color-text-primary); }
.squad-item__loc {
  font-size: 10px;
  color: var(--color-text-muted);
  display: flex;
  align-items: center;
  gap: 4px;
}
.squad-item__status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  display: inline-block;
}
.squad-item__status-dot--moving { background: var(--color-green); }
.squad-item__status-dot--stationary { background: var(--color-accent-amber); }
.squad-item__dist { text-align: right; flex-shrink: 0; }
.squad-item__dist-val {
  font-family: var(--font-heading);
  font-size: var(--text-base);
  font-weight: 800;
  color: var(--color-accent-blue);
  display: block;
}
.squad-item__status-label {
  font-size: 8px;
  font-weight: 600;
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
/* ---- Ping Button ---- */
.vf-ping-btn {
  width: 100%;
  padding: 10px;
  margin-top: var(--space-sm);
  background: var(--color-bg-elevated);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  color: var(--color-text-secondary);
  font-family: var(--font-heading);
  font-size: var(--text-xs);
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all var(--transition-fast);
}
.vf-ping-btn:hover { border-color: var(--color-accent-blue); color: var(--color-accent-blue); }
/* ---- Quick Actions ---- */
.vf-quick-actions {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--space-xs);
}
.qa-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 12px;
  border-radius: var(--radius-md);
  border: 1px solid var(--color-border);
  background: var(--color-bg-elevated);
  color: var(--color-text-primary);
  font-size: 11px;
  font-weight: 700;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all var(--transition-fast);
}
.qa-btn:hover { transform: translateY(-1px); }
.qa-btn--green { border-color: rgba(34, 197, 94, 0.3); }
.qa-btn--green:hover { background: rgba(34, 197, 94, 0.1); color: var(--color-green); }
.qa-btn--blue { border-color: rgba(0, 212, 255, 0.3); }
.qa-btn--blue:hover { background: rgba(0, 212, 255, 0.1); color: var(--color-accent-blue); }
.qa-btn--red { border-color: rgba(239, 68, 68, 0.3); color: var(--color-red); }
.qa-btn--red:hover { background: rgba(239, 68, 68, 0.1); }
.qa-btn--purple { border-color: rgba(168, 85, 247, 0.3); }
.qa-btn--purple:hover { background: rgba(168, 85, 247, 0.1); color: var(--color-accent-purple); }
.qa-btn__icon { font-size: 14px; }
/* ---- Captain Mode Chat ---- */
.vf-captain__sub {
  font-size: 9px;
  color: var(--color-accent-amber);
  font-weight: 600;
  font-style: italic;
  margin-left: auto;
}
.vf-chat {
  max-height: 180px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: var(--space-xs);
  margin-bottom: var(--space-sm);
  padding-right: 4px;
}
.vf-chat::-webkit-scrollbar { width: 3px; }
.vf-chat::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 3px; }
.vf-chat-msg {
  display: flex;
  gap: var(--space-xs);
  align-items: flex-start;
}
.vf-chat-msg--user { justify-content: flex-end; }
.vf-chat-msg__avatar {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: rgba(234, 179, 8, 0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
}
.vf-chat-msg__bubble {
  max-width: 80%;
  padding: 8px 12px;
  border-radius: var(--radius-md);
  font-size: var(--text-xs);
  line-height: 1.5;
}
.vf-chat-msg--captain .vf-chat-msg__bubble {
  background: var(--color-bg-elevated);
  border: 1px solid var(--color-border);
  color: var(--color-text-secondary);
}
.vf-chat-msg--user .vf-chat-msg__bubble {
  background: rgba(0, 212, 255, 0.12);
  border: 1px solid rgba(0, 212, 255, 0.25);
  color: var(--color-accent-blue);
}
.vf-chat-input {
  display: flex;
  gap: var(--space-xs);
}
.vf-chat-input__field {
  flex: 1;
  padding: 8px 12px;
  background: var(--color-bg-elevated);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  color: var(--color-text-primary);
  font-size: var(--text-xs);
  font-family: var(--font-body);
  outline: none;
  transition: border-color var(--transition-fast);
}
.vf-chat-input__field:focus { border-color: var(--color-accent-blue); }
.vf-chat-input__field::placeholder { color: var(--color-text-muted); }
.vf-chat-input__send {
  width: 36px; height: 36px;
  border-radius: var(--radius-md);
  background: var(--color-accent-blue);
  border: none;
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
}
.vf-chat-input__send:hover { background: #00b8d4; }
/* ---- Match Momentum ---- */
.vf-momentum__row {
  display: flex;
  align-items: baseline;
  gap: var(--space-md);
}
.vf-momentum__val {
  font-family: var(--font-heading);
  font-size: var(--text-4xl);
  font-weight: 800;
  color: var(--color-text-primary);
  line-height: 1;
}
.vf-momentum__trend {
  font-size: var(--text-xs);
  font-weight: 600;
}
/* ---- Mobile Bottom Nav (visible < 1024px) ---- */
.vf-mobile-nav { display: none; }
/* ---- Mobile Responsive ---- */
@media (max-width: 1200px) {
  .vf-layout { grid-template-columns: 1fr 340px; padding: var(--space-sm); }
  .sde-grid { grid-template-columns: repeat(3, 1fr); }
  .vf-nav-split { grid-template-columns: 1fr 260px; }
}
@media (max-width: 1024px) {
  .vf-layout { grid-template-columns: 1fr; }
  .vf-right { display: none; }
  .vf-right--mobile-show { display: flex; position: fixed; top: 52px; right: 0; bottom: 56px; width: 360px; z-index: 200; background: var(--color-bg-primary); border-left: 1px solid var(--color-border); overflow-y: auto; padding: var(--space-md); box-shadow: -8px 0 30px rgba(0,0,0,0.5); }
  .vf-mobile-nav { display: flex; }
  .vf-tabs { display: none; }
  .sde-grid { grid-template-columns: repeat(3, 1fr); }
  .vf-nav-split { grid-template-columns: 1fr; }
  .vf-map-canvas { height: 280px; }
  .vf-nav-dests { max-height: 300px; }
  .vf-ql-split { grid-template-columns: 1fr; }
  .vf-ar-layout { grid-template-columns: 1fr; }
  .ar-canvas { height: 280px; }
  .vf-ticket-layout { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  .sde-grid { grid-template-columns: repeat(2, 1fr); }
  .vf-broadcast { padding: 8px var(--space-md); }
  .vf-layout { padding: var(--space-xs); }
  .gate-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 480px) {
  .sde-grid { grid-template-columns: 1fr; }
  .vf-match-teams { flex-direction: column; gap: 4px; }
}

    // Best Exit: Lowest crowd pressure (inverse capacity/occupancy approach to show different logic)
    // Sometimes entry and exit will be the same if it's just the absolute best gate, but this provides variation.
    // Realistically, egress wants lowest queue size x lowest occupancy.
    const bestExitOpts = zones.filter(z => z.type === 'gate').sort((a, b) => {
       // favor gates with high capacity and low occupancy for exiting
       const aScore = a.occupancy / a.capacity;
       const bScore = b.occupancy / b.capacity;
       return aScore - bScore;
    });
    // Pick the best exit that is NOT the best entry if possible, purely to diversify suggestions unless the venue is tiny
    let bestExit = bestExitOpts[0];
    if (bestExit.id === bestEntry.id && bestExitOpts.length > 1) {
        bestExit = bestExitOpts[1];

    // Best Food: Walk time + Wait time
    const bestFoodOpts = concessions.filter(c => c.type === 'food').map(c => {
       const route = findFastestRoute('user-seat', c.id + '-node');
       const walkTime = route ? route.totalWalkMin : 5;
       return { food: c, score: c.waitTime + walkTime };
    }).sort((a, b) => a.score - b.score);
    const bestFood = bestFoodOpts[0] ? bestFoodOpts[0].food : null;
    // Best Transport
    const optimalTransports = getOptimalTransport();
    const bestTransport = optimalTransports[0];
    return {
      bestEntry: {
        label: 'Best Entry',
        name: bestEntry.name,
        icon: '🚪',

        label: 'Best Food',

        icon: bestFood ? bestFood.icon : '🍔',
        detail: `Shortest wait time (${bestFood ? bestFood.waitTime : '?'}m)`,

        name: 'Start Navigation',
        icon: '🧭',
        detail: 'Custom point-to-point routing with turn-by-turn',
        color: 'cyan',

  let broadcasts = [];

  }
  // Navigation route suggestion
  function getRoute(destinationId) {
    const dest = [...concessions, ...restrooms].find(c => c.id === destinationId);
    if (!dest) return null;
    const dx = dest.x - userPosition.x;
    const dy = dest.y - userPosition.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const walkMins = Math.round(dist * 8 + 0.5);
    const totalMins = walkMins + dest.waitTime;
    return {
      destination: dest.name,
      walkTime: walkMins,

      totalTime: totalMins,
      steps: Math.round(dist * 400),

  // =====================================================

/* ============================================================
   Insight-X — Real-Time API Integration Layer
   ============================================================
   Connects to real APIs for live match data and weather.
   Falls back gracefully to simulated data when API keys
   are not configured or requests fail.
   ============================================================ */
const ApiService = (() => {
  // --- Configuration (set via Settings modal) ---
  let config = {
    footballApiKey: localStorage.getItem('vf_football_key') || '',
    weatherApiKey: localStorage.getItem('vf_weather_key') || '',
    venueCity: localStorage.getItem('vf_venue_city') || 'London',
    venueCountry: localStorage.getItem('vf_venue_country') || 'GB',
    crowdApiUrl: localStorage.getItem('vf_crowd_api') || '', // Custom IoT endpoint
    pollingInterval: 30000, // 30s for API calls (respect rate limits)
  };
  let status = {
    football: { connected: false, lastUpdate: null, error: null },
    weather: { connected: false, lastUpdate: null, error: null },
    crowd: { connected: false, lastUpdate: null, error: null },
  };
  let pollingTimers = {};
  let listeners = [];
  // --- Save/load config ---
  function saveConfig(newConfig) {
    Object.assign(config, newConfig);
    if (newConfig.footballApiKey !== undefined) localStorage.setItem('vf_football_key', newConfig.footballApiKey);
    if (newConfig.weatherApiKey !== undefined) localStorage.setItem('vf_weather_key', newConfig.weatherApiKey);
    if (newConfig.venueCity !== undefined) localStorage.setItem('vf_venue_city', newConfig.venueCity);
    if (newConfig.venueCountry !== undefined) localStorage.setItem('vf_venue_country', newConfig.venueCountry);
    if (newConfig.crowdApiUrl !== undefined) localStorage.setItem('vf_crowd_api', newConfig.crowdApiUrl);
  }
  function getConfig() {
    return { ...config };
  }
  function getStatus() {
    return JSON.parse(JSON.stringify(status));
  }
  // --- Status listeners ---
  function onStatusChange(fn) {
    listeners.push(fn);
    return () => { listeners = listeners.filter(l => l !== fn); };
  }
  function emitStatus() {
    listeners.forEach(fn => fn(getStatus()));
  }
  // =====================================================
  //  1. FOOTBALL-DATA.ORG — Live Match Data
  // =====================================================
  // Free tier: 10 requests/min
  // Docs: https://www.football-data.org/documentation/api
  // =====================================================
  async function fetchLiveMatch() {
    if (!config.footballApiKey) {
      status.football = { connected: false, lastUpdate: null, error: 'No API key configured' };
      emitStatus();
      return null;
    }
    try {
      // Fetch today's matches from top leagues
      const response = await fetch('https://api.football-data.org/v4/matches?status=LIVE,IN_PLAY,PAUSED', {
        headers: { 'X-Auth-Token': config.footballApiKey },
      });
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
      }
      const data = await response.json();
      status.football = { connected: true, lastUpdate: new Date().toISOString(), error: null };
      emitStatus();
      if (data.matches && data.matches.length > 0) {
        // Take the first live match
        const match = data.matches[0];
        return transformFootballData(match);
      }
      // No live matches — try scheduled for today
      const todayResp = await fetch('https://api.football-data.org/v4/matches?status=SCHEDULED,TIMED', {
        headers: { 'X-Auth-Token': config.footballApiKey },
      });
      if (todayResp.ok) {
        const todayData = await todayResp.json();
        if (todayData.matches && todayData.matches.length > 0) {
          return transformFootballData(todayData.matches[0]);
        }
      }
      return null; // No matches today
    } catch (err) {
      console.warn('[Insight-X API] Football-Data error:', err.message);
      status.football = { connected: false, lastUpdate: null, error: err.message };
      emitStatus();
      return null;
    }
  }
  function transformFootballData(match) {
    const statusMap = {
      'SCHEDULED': 'PRE_GAME',
      'TIMED': 'PRE_GAME',
      'IN_PLAY': 'LIVE',
      'PAUSED': 'HALFTIME',
      'HALF_TIME': 'HALFTIME',
      'SECOND_HALF': 'SECOND_HALF',
      'FINISHED': 'FULL_TIME',
      'EXTRA_TIME': 'LIVE',
      'PENALTY_SHOOTOUT': 'LIVE',
    };
    const events = [];
    // Football-Data doesn't provide detailed events in free tier,
    // but we can extract goals from score
    if (match.score && match.score.fullTime) {
      if (match.score.fullTime.home > 0) {
        events.push({
          minute: '?',
          type: 'goal',
          team: 'home',
          player: match.homeTeam.shortName || 'Home',
          desc: `Goal by ${match.homeTeam.shortName || 'Home'}`,
        });
      }
    }
    return {
      homeTeam: match.homeTeam.shortName || match.homeTeam.name || 'Home',
      awayTeam: match.awayTeam.shortName || match.awayTeam.name || 'Away',
      homeScore: match.score?.fullTime?.home ?? match.score?.halfTime?.home ?? 0,
      awayScore: match.score?.fullTime?.away ?? match.score?.halfTime?.away ?? 0,
      minute: match.minute || 0,
      half: match.score?.halfTime ? 2 : 1,
      status: statusMap[match.status] || 'PRE_GAME',
      events: events,
      competition: match.competition?.name || '',
      matchday: match.matchday || '',
      venue: match.venue || 'Stadium',
      utcDate: match.utcDate,
      apiSource: 'football-data.org',
    };
  }
  // =====================================================
  //  2. OPENWEATHERMAP — Real-time Weather
  // =====================================================
  // Free tier: 60 calls/min, current weather
  // Docs: https://openweathermap.org/current
  // =====================================================
  async function fetchWeather() {
    if (!config.weatherApiKey) {
      status.weather = { connected: false, lastUpdate: null, error: 'No API key configured' };
      emitStatus();
      return null;
    }
    try {
      const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(config.venueCity)},${config.venueCountry}&units=metric&appid=${config.weatherApiKey}`;
      const response = await fetch(url);

    const dpr = window.devicePixelRatio || 1;

    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);

      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();

    const bLen = 30;
    const bPad = 15;
    ctx.strokeStyle = 'rgba(0, 212, 255, 0.6)';
    ctx.lineWidth = 2;
    // Top-left
    ctx.beginPath(); ctx.moveTo(bPad, bPad + bLen); ctx.lineTo(bPad, bPad); ctx.lineTo(bPad + bLen, bPad); ctx.stroke();

    ctx.beginPath(); ctx.moveTo(w - bPad - bLen, bPad); ctx.lineTo(w - bPad, bPad); ctx.lineTo(w - bPad, bPad + bLen); ctx.stroke();
    // Bottom-left
    ctx.beginPath(); ctx.moveTo(bPad, h - bPad - bLen); ctx.lineTo(bPad, h - bPad); ctx.lineTo(bPad + bLen, h - bPad); ctx.stroke();
    // Bottom-right
    ctx.beginPath(); ctx.moveTo(w - bPad - bLen, h - bPad); ctx.lineTo(w - bPad, h - bPad); ctx.lineTo(w - bPad, h - bPad - bLen); ctx.stroke();
    // Traffic zones
    if (arData.trafficZones) {
      arData.trafficZones.forEach(tz => {
        const tx = tz.x * w;
        const ty = tz.y * h;
        const tr = tz.radius * Math.min(w, h);
        const color = tz.level === 'high' ? '239, 68, 68' :
                      tz.level === 'moderate' ? '234, 179, 8' : '34, 197, 94';
        // Traffic zone circle
        const grad = ctx.createRadialGradient(tx, ty, 0, tx, ty, tr);
        grad.addColorStop(0, `rgba(${color}, 0.3)`);
        grad.addColorStop(0.7, `rgba(${color}, 0.1)`);
        grad.addColorStop(1, `rgba(${color}, 0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(tx, ty, tr, 0, Math.PI * 2);
        ctx.fill();
        // Pulsing border
        const pulse = Math.sin(Date.now() / 500) * 0.3 + 0.5;
        ctx.strokeStyle = `rgba(${color}, ${pulse})`;
        ctx.lineWidth = 1.5;
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
        // Label
        ctx.fillStyle = 'rgba(10, 14, 26, 0.85)';
        const labelW = 110;
        ctx.beginPath();
        ctx.roundRect(tx - labelW / 2, ty - 18, labelW, 36, 6);
        ctx.fill();
        ctx.font = '600 10px Inter, sans-serif';
        ctx.fillStyle = `rgb(${color})`;
        ctx.textAlign = 'center';
        ctx.fillText(tz.area, tx, ty - 4);
        ctx.font = '500 9px Inter, sans-serif';
        ctx.fillStyle = '#94A3B8';
        ctx.fillText(tz.tips, tx, ty + 10);
      });
    }
    // Friend markers
    if (arData.friends) {
      arData.friends.forEach(f => {
        const fx = f.x * w;
        const fy = f.y * h;
        // Ping circle
        const pingPhase = (Date.now() / 1000 + f.x * 10) % 2;
        if (pingPhase < 1) {
          ctx.beginPath();
          ctx.arc(fx, fy, 20 * pingPhase, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(0, 212, 255, ${1 - pingPhase})`;
          ctx.lineWidth = 1.5;

        }
        // Avatar dot
        ctx.beginPath();
        ctx.arc(fx, fy, 12, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0, 212, 255, 0.2)';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(fx, fy, 8, 0, Math.PI * 2);
        ctx.fillStyle = '#00D4FF';
        ctx.fill();
        // Name tag
        ctx.font = '700 10px Inter, sans-serif';
        const nameWidth = ctx.measureText(f.name).width;
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.beginPath();
        ctx.roundRect(fx - nameWidth / 2 - 8, fy - 28, nameWidth + 16, 18, 4);
        ctx.fill();
        ctx.strokeStyle = 'rgba(0, 212, 255, 0.5)';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.fillStyle = '#00D4FF';
        ctx.textAlign = 'center';
        ctx.fillText(`${f.emoji} ${f.name}`, fx, fy - 16);

        ctx.fillStyle = '#94A3B8';

    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(0, 0, w, 32);
    ctx.font = '600 10px Inter, sans-serif';
    ctx.fillStyle = '#00D4FF';
    ctx.textAlign = 'left';
    ctx.fillText('📡 AR SAFETY VIEW', 12, 20);

    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, scanY);
    ctx.lineTo(w, scanY);
    ctx.stroke();

/* ============================================================
   Insight-X — Lightweight Canvas Charts
   ============================================================ */
const Charts = (() => {
  const COLORS = [
    '#00D4FF', '#FFB800', '#A855F7', '#22C55E',
    '#EF4444', '#F97316', '#EC4899', '#6366F1',
  ];
  // --- Utility ---
  function setupCanvas(canvas) {
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    return { ctx, w: rect.width, h: rect.height };
  }
  // --- Line Chart ---
  function lineChart(canvas, data, options = {}) {
    const { ctx, w, h } = setupCanvas(canvas);
    const {
      labels = [],
      datasets = [],  // [{ label, data, color }]
      showGrid = true,
      showDots = true,
      smoothing = 0.3,
      yMin = null,
      yMax = null,
      showArea = true,
      title = '',
      yLabel = '',
    } = { ...data, ...options };
    const padding = { top: title ? 35 : 15, right: 15, bottom: 35, left: 40 };
    const chartW = w - padding.left - padding.right;
    const chartH = h - padding.top - padding.bottom;
    ctx.clearRect(0, 0, w, h);
    // Title
    if (title) {
      ctx.font = '600 13px Inter, sans-serif';
      ctx.fillStyle = '#F1F5F9';
      ctx.textAlign = 'left';
      ctx.fillText(title, padding.left, 20);
    }
    // Compute y range
    let allValues = datasets.flatMap(d => d.data || []);
    const computedMin = yMin !== null ? yMin : Math.max(0, Math.min(...allValues) - 2);
    const computedMax = yMax !== null ? yMax : Math.max(...allValues) + 2;
    const yRange = computedMax - computedMin || 1;
    // Grid
    if (showGrid) {
      const gridLines = 5;
      ctx.strokeStyle = 'rgba(148, 163, 184, 0.08)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= gridLines; i++) {
        const y = padding.top + (chartH / gridLines) * i;
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(w - padding.right, y);
        ctx.stroke();
        // Y labels
        const val = computedMax - (yRange / gridLines) * i;
        ctx.font = '500 9px Inter, sans-serif';
        ctx.fillStyle = '#64748B';
        ctx.textAlign = 'right';
        ctx.fillText(Math.round(val) + (yLabel ? yLabel : ''), padding.left - 6, y + 3);
      }
    }
    // X labels
    if (labels.length > 0) {
      const step = Math.max(1, Math.floor(labels.length / 8));
      ctx.font = '500 9px Inter, sans-serif';
      ctx.fillStyle = '#64748B';
      ctx.textAlign = 'center';
      labels.forEach((label, i) => {
        if (i % step === 0 || i === labels.length - 1) {
          const x = padding.left + (chartW / Math.max(1, labels.length - 1)) * i;
          ctx.fillText(label, x, h - padding.bottom + 16);
        }
      });
    }
    // Data lines
    datasets.forEach((dataset, di) => {
      const vals = dataset.data || [];
      if (vals.length < 2) return;
      const color = dataset.color || COLORS[di % COLORS.length];
      const points = vals.map((v, i) => ({
        x: padding.left + (chartW / Math.max(1, vals.length - 1)) * i,
        y: padding.top + chartH - ((v - computedMin) / yRange) * chartH,
      }));
      // Area fill
      if (showArea) {
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
          const prev = points[i - 1];
          const curr = points[i];
          const cpx1 = prev.x + (curr.x - prev.x) * smoothing;
          const cpx2 = curr.x - (curr.x - prev.x) * smoothing;
          ctx.bezierCurveTo(cpx1, prev.y, cpx2, curr.y, curr.x, curr.y);
        }
        ctx.lineTo(points[points.length - 1].x, padding.top + chartH);
        ctx.lineTo(points[0].x, padding.top + chartH);
        ctx.closePath();
        const grad = ctx.createLinearGradient(0, padding.top, 0, padding.top + chartH);
        grad.addColorStop(0, color.replace(')', ', 0.2)').replace('rgb', 'rgba'));
        grad.addColorStop(1, color.replace(')', ', 0.01)').replace('rgb', 'rgba'));
        // Simple alpha approach
        ctx.fillStyle = `${color}15`;
        ctx.fill();
      }
      // Line
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) {
        const prev = points[i - 1];
        const curr = points[i];
        const cpx1 = prev.x + (curr.x - prev.x) * smoothing;
        const cpx2 = curr.x - (curr.x - prev.x) * smoothing;
        ctx.bezierCurveTo(cpx1, prev.y, cpx2, curr.y, curr.x, curr.y);
      }
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.stroke();
      // Dots
      if (showDots && vals.length <= 20) {
        points.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
          ctx.fillStyle = color;
          ctx.fill();
          ctx.strokeStyle = '#0a0e1a';
          ctx.lineWidth = 1.5;
          ctx.stroke();
        });
      }
      // Last value label
      const last = points[points.length - 1];
      ctx.font = '700 10px Inter, sans-serif';
      ctx.fillStyle = color;
      ctx.textAlign = 'left';
      ctx.fillText(vals[vals.length - 1] + (yLabel || ''), last.x + 6, last.y + 3);
    });
  }
  // --- Bar Chart ---
  function barChart(canvas, data, options = {}) {
    const { ctx, w, h } = setupCanvas(canvas);
    const {
      labels = [],
      values = [],
      colors = [],
      maxValue = null,
      title = '',
      horizontal = false,
    } = { ...data, ...options };
    const padding = { top: title ? 35 : 15, right: 15, bottom: 30, left: horizontal ? 90 : 40 };
    const chartW = w - padding.left - padding.right;
    const chartH = h - padding.top - padding.bottom;
    ctx.clearRect(0, 0, w, h);
    if (title) {
      ctx.font = '600 13px Inter, sans-serif';
      ctx.fillStyle = '#F1F5F9';
      ctx.textAlign = 'left';
      ctx.fillText(title, padding.left, 20);
    }
    const max = maxValue || Math.max(...values, 1);
    if (horizontal) {
      const barH = Math.min(24, (chartH / values.length) * 0.7);
      const gap = (chartH / values.length);
      values.forEach((val, i) => {
        const barW = (val / max) * chartW;
        const y = padding.top + gap * i + (gap - barH) / 2;
        const color = colors[i] || COLORS[i % COLORS.length];
        // Bar
        const grad = ctx.createLinearGradient(padding.left, 0, padding.left + barW, 0);
        grad.addColorStop(0, color);
        grad.addColorStop(1, color + '80');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(padding.left, y, barW, barH, [0, 4, 4, 0]);
        ctx.fill();
        // Label
        ctx.font = '500 10px Inter, sans-serif';
        ctx.fillStyle = '#94A3B8';
        ctx.textAlign = 'right';
        ctx.fillText(labels[i] || '', padding.left - 8, y + barH / 2 + 3);
        // Value
        ctx.font = '700 10px Inter, sans-serif';
        ctx.fillStyle = '#F1F5F9';
        ctx.textAlign = 'left';
        ctx.fillText(val, padding.left + barW + 6, y + barH / 2 + 3);
      });
    } else {
      const barW = Math.min(32, (chartW / values.length) * 0.6);
      const gap = chartW / values.length;
      values.forEach((val, i) => {
        const barH2 = (val / max) * chartH;
        const x = padding.left + gap * i + (gap - barW) / 2;
        const y = padding.top + chartH - barH2;
        const color = colors[i] || COLORS[i % COLORS.length];
        const grad = ctx.createLinearGradient(0, y, 0, y + barH2);
        grad.addColorStop(0, color);
        grad.addColorStop(1, color + '40');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(x, y, barW, barH2, [4, 4, 0, 0]);
        ctx.fill();
        // Label
        ctx.font = '500 9px Inter, sans-serif';
        ctx.fillStyle = '#64748B';
        ctx.textAlign = 'center';
        ctx.fillText(labels[i] || '', x + barW / 2, h - padding.bottom + 14);
        // Value
        ctx.font = '700 9px Inter, sans-serif';
        ctx.fillStyle = '#F1F5F9';
        ctx.fillText(val, x + barW / 2, y - 6);
      });
    }
  }
  // --- Donut Chart ---
  function donutChart(canvas, data, options = {}) {
    const { ctx, w, h } = setupCanvas(canvas);
    const {
      segments = [],  // [{ label, value, color }]
      centerLabel = '',
      centerValue = '',
      title = '',
    } = { ...data, ...options };
    ctx.clearRect(0, 0, w, h);
    const cx = w / 2;
    const cy = (title ? h * 0.5 + 12 : h / 2);
    const radius = Math.min(cx, cy) * 0.7;
    const thickness = radius * 0.3;
    if (title) {
      ctx.font = '600 13px Inter, sans-serif';
      ctx.fillStyle = '#F1F5F9';
      ctx.textAlign = 'center';
      ctx.fillText(title, cx, 20);
    }
    const total = segments.reduce((s, seg) => s + seg.value, 0) || 1;
    let angle = -Math.PI / 2;
    segments.forEach((seg, i) => {
      const sliceAngle = (seg.value / total) * Math.PI * 2;
      const color = seg.color || COLORS[i % COLORS.length];
      ctx.beginPath();
      ctx.arc(cx, cy, radius, angle, angle + sliceAngle);
      ctx.arc(cx, cy, radius - thickness, angle + sliceAngle, angle, true);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
      angle += sliceAngle;
    });
    // Center text
    if (centerValue) {
      ctx.font = '800 22px Outfit, sans-serif';
      ctx.fillStyle = '#F1F5F9';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(centerValue, cx, cy - 6);
    }
    if (centerLabel) {
      ctx.font = '500 10px Inter, sans-serif';
      ctx.fillStyle = '#94A3B8';
      ctx.fillText(centerLabel, cx, cy + 14);
    }
    // Legend
    const legendY = cy + radius + 15;
    const legendItemW = Math.min(130, w / Math.min(segments.length, 3));
    const cols = Math.min(segments.length, 3);
    const startX = cx - (cols * legendItemW) / 2;
    segments.forEach((seg, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const lx = startX + col * legendItemW + 8;
      const ly = legendY + row * 16;
      if (ly < h - 5) {
        ctx.fillStyle = seg.color || COLORS[i % COLORS.length];
        ctx.beginPath();
        ctx.arc(lx, ly, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.font = '500 9px Inter, sans-serif';
        ctx.fillStyle = '#94A3B8';
        ctx.textAlign = 'left';
        ctx.fillText(`${seg.label} (${seg.value})`, lx + 10, ly + 3);
      }
    });
  }
  // --- Gauge Chart ---
  function gaugeChart(canvas, data, options = {}) {
    const { ctx, w, h } = setupCanvas(canvas);
    const {
      value = 0,
      maxVal = 100,
      label = '',
      color = '#00D4FF',
      suffix = '%',
    } = { ...data, ...options };
    ctx.clearRect(0, 0, w, h);
    const cx = w / 2;
    const cy = h * 0.6;
    const radius = Math.min(cx * 0.85, cy * 0.85);
    const thickness = radius * 0.22;
    const startAngle = Math.PI * 0.8;
    const endAngle = Math.PI * 2.2;
    const sweepAngle = endAngle - startAngle;
    const fillAngle = startAngle + (value / maxVal) * sweepAngle;
    // Background arc
    ctx.beginPath();
    ctx.arc(cx, cy, radius, startAngle, endAngle);
    ctx.strokeStyle = 'rgba(148, 163, 184, 0.1)';
    ctx.lineWidth = thickness;
    ctx.lineCap = 'round';
    ctx.stroke();
    // Value arc
    ctx.beginPath();
    ctx.arc(cx, cy, radius, startAngle, fillAngle);
    ctx.strokeStyle = color;
    ctx.lineWidth = thickness;
    ctx.lineCap = 'round';
    ctx.stroke();
    // Value text
    ctx.font = '800 28px Outfit, sans-serif';
    ctx.fillStyle = '#F1F5F9';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`${Math.round(value)}${suffix}`, cx, cy - 5);
    if (label) {
      ctx.font = '500 11px Inter, sans-serif';
      ctx.fillStyle = '#94A3B8';
      ctx.fillText(label, cx, cy + 20);
    }
  }
  return { lineChart, barChart, donutChart, gaugeChart };
})();
